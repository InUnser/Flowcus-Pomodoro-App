<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Flowcus - Session Settings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom styling to ensure sliders match the "New Session" aesthetic */
        input[type=range] {
            -webkit-appearance: none;
            background: transparent;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 12px;
            background: #1a1a1a;
            border-radius: 6px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 32px;
            width: 32px;
            border-radius: 50%;
            background: #f3f4f6;
            border: 4px solid #1a1a1a;
            margin-top: -10px;
            cursor: pointer;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans text-gray-900">

<!-- Include the Header Fragment -->
<div th:replace="~{fragments/header :: navbar}"></div>

<main class="container mx-auto px-4 py-12 flex justify-center items-center">

    <div class="w-full max-w-xl bg-gray-300 p-10 rounded-[2.5rem] shadow-sm">
        <h1 class="text-5xl font-medium text-center mb-8">Session Settings</h1>

        <!-- Success Message Alert (Shown via Flash Attributes after saving) -->
        <div th:if="${successMessage}" class="mb-8 p-4 bg-green-100 border border-green-400 text-green-700 rounded-xl text-center font-medium">
            <p th:text="${successMessage}"></p>
        </div>

        <form th:action="@{/session-settings}" th:object="${settingDto}" method="post" class="space-y-6">

            <!-- Focus Goal -->
            <div>
                <label class="block text-2xl mb-2">Default Focus Sessions to Long Break</label>
                <input type="number" th:field="*{sessionsBeforeLongBreak}" min="2" max="10"
                       class="w-full p-3 rounded-lg border-none focus:ring-2 focus:ring-green-800 outline-none text-xl bg-white shadow-inner">
                <p th:if="${#fields.hasErrors('sessionsBeforeLongBreak')}" th:errors="*{sessionsBeforeLongBreak}" class="text-red-600 text-sm mt-1"></p>
            </div>

            <!-- Default Focus Duration Slider -->
            <div>
                <div class="flex justify-between items-center mb-2 text-gray-700">
                    <label class="text-2xl">Default Focus Duration</label>
                    <span class="text-xl font-bold" id="focusVal" th:text="*{defaultFocusMinutes} + ' min'">25 min</span>
                </div>
                <input type="range" th:field="*{defaultFocusMinutes}" min="1" max="180" step="1"
                       class="w-full h-3 bg-gray-800 rounded-lg appearance-none cursor-pointer"
                       oninput="document.getElementById('focusVal').innerText = this.value + ' min'">
            </div>

            <!-- Default Short Break Duration Slider -->
            <div>
                <div class="flex justify-between items-center mb-2 text-gray-700">
                    <label class="text-2xl">Default Short Break Duration</label>
                    <span class="text-xl font-bold" id="shortVal" th:text="*{defaultShortBreakMinutes} + ' min'">5 min</span>
                </div>
                <input type="range" th:field="*{defaultShortBreakMinutes}" min="1" max="30" step="1"
                       class="w-full h-3 bg-gray-800 rounded-lg appearance-none cursor-pointer"
                       oninput="document.getElementById('shortVal').innerText = this.value + ' min'">
            </div>

            <!-- Default Long Break Duration Slider -->
            <div>
                <div class="flex justify-between items-center mb-2 text-gray-700">
                    <label class="text-2xl">Default Long Break Duration</label>
                    <span class="text-xl font-bold" id="longVal" th:text="*{defaultLongBreakMinutes} + ' min'">15 min</span>
                </div>
                <input type="range" th:field="*{defaultLongBreakMinutes}" min="1" max="60" step="1"
                       class="w-full h-3 bg-gray-800 rounded-lg appearance-none cursor-pointer"
                       oninput="document.getElementById('longVal').innerText = this.value + ' min'">
            </div>

            <!-- Action Buttons -->
            <div class="flex justify-between gap-4 pt-6">
                <a th:href="@{/home}"
                   class="bg-red-700 text-white px-8 py-3 rounded-xl text-xl font-bold hover:bg-red-800 transition shadow-md w-1/2 text-center">
                    Cancel
                </a>
                <button type="submit"
                        class="bg-green-800 text-white px-8 py-3 rounded-xl text-xl font-bold hover:bg-green-900 transition shadow-md w-1/2">
                    Save Settings
                </button>
            </div>
        </form>
    </div>

</main>

</body>
</html>
