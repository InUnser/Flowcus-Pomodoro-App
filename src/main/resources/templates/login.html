<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Flowcus - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center font-sans">

<div class="w-full max-w-md">
    <h1 class="text-5xl font-medium text-center mb-10">Login</h1>

    <div class="bg-gray-300 p-10 rounded-[2rem] shadow-sm">
        <!-- Alert for successful registration -->
        <div th:if="${param.registered}" class="mb-4 p-3 bg-green-100 text-green-700 rounded-lg text-sm text-center">
            Registration successful! Please login.
        </div>

        <!-- Error message for invalid login -->
        <div th:if="${param.error}" class="mb-4 p-3 bg-red-100 text-red-700 rounded-lg text-sm text-center">
            Invalid email or password.
        </div>

        <form th:action="@{/login}" method="post" class="space-y-6">
            <div>
                <label class="block text-xl mb-2">Email</label>
                <input type="email" name="username" required
                       class="w-full p-3 rounded-md border-none focus:ring-2 focus:ring-green-800 outline-none">
            </div>

            <div>
                <label class="block text-xl mb-2">Password</label>
                <input type="password" name="password" required
                       class="w-full p-3 rounded-md border-none focus:ring-2 focus:ring-green-800 outline-none">
            </div>

            <div class="flex justify-center pt-4">
                <button type="submit"
                        class="bg-green-800 text-white px-10 py-2 rounded-lg text-lg hover:bg-green-900 transition shadow-md">
                    Login
                </button>
            </div>
        </form>

        <p class="mt-8 text-center text-lg">
            Dont have an account?
            <a th:href="@{/register}" class="underline font-medium decoration-1 underline-offset-4">Register Here</a>
        </p>
    </div>
</div>

</body>
</html>
