<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Flowcus - People</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen font-sans text-gray-900">

<div th:replace="~{fragments/header :: navbar}"></div>

<main class="container mx-auto px-4 py-32 flex flex-col items-center">

    <!-- Search Form -->
    <form th:action="@{/people}" method="get" class="w-full max-w-2xl mb-8">
        <!-- Flex container to hold input and button together on the same line -->
        <div class="flex items-center border-b border-gray-500 focus-within:border-gray-900 transition-colors py-2 px-1">

            <input type="text" name="q" placeholder="Search User" th:value="${searchQuery}" autocomplete="off"
                   class="w-full bg-transparent text-xl outline-none placeholder-gray-500">

            <!-- Visible submit button with Magnifying Glass SVG -->
            <button type="submit" class="text-gray-500 hover:text-gray-900 transition-colors focus:outline-none p-1 ml-2" title="Search">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
            </button>

        </div>
    </form>

    <!-- Search Results -->
    <div th:if="${searchResults != null}" class="w-full max-w-2xl">
        <!-- Loop through the returned users -->
        <a th:each="user : ${searchResults}" th:href="@{/people/{id}(id=${user.id})}"
           class="flex items-center py-4 border-b border-gray-300 hover:bg-gray-200 transition-colors px-2 rounded-t-sm group">

            <div class="w-12 h-12 rounded-full border-1 border-gray-800 overflow-hidden bg-white flex items-center justify-center mr-6 group-hover:scale-105 transition-transform">
                <img th:if="${user.profilePic != null}" th:src="${user.profilePic}" class="w-full h-full object-cover">
                <svg th:unless="${user.profilePic != null}" class="w-8 h-8 text-gray-800" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                </svg>
            </div>

            <span class="text-xl" th:text="${user.username}">Username</span>
        </a>

        <!-- If no users match the query -->
        <div th:if="${#lists.isEmpty(searchResults)}" class="text-gray-500 text-lg py-4 px-2">
            No users found matching "<span th:text="${searchQuery}"></span>"
        </div>
    </div>

</main>

</body>
</html>
