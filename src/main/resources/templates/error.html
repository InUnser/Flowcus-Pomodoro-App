<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Flowcus - Error</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen font-sans text-gray-900">

<main class="container mx-auto px-4 py-32 flex flex-col items-center justify-center">

    <div class="bg-gray-300 p-12 rounded-[2.5rem] shadow-sm max-w-2xl text-center">

        <!-- Warning Icon -->
        <svg class="w-24 h-24 text-red-600 mx-auto mb-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
        </svg>

        <h1 class="text-5xl font-medium mb-6">We have a problem.</h1>

        <!-- Displays message from the Exception Handler -->
        <p class="text-xl text-gray-700 mb-10" th:text="${errorMessage}">
            An unexpected error occurred.
        </p>

        <!-- Safe Action Buttons -->
        <div class="flex justify-center gap-6">
            <a th:href="@{/home}"
               class="bg-gray-800 text-white px-8 py-3 rounded-xl text-xl font-bold hover:bg-gray-900 transition shadow-md">
                Return to Home
            </a>
        </div>

    </div>

</main>

</body>
</html>
