<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Flowcus - Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center font-sans py-12">

<div class="w-full max-w-md">
    <h1 class="text-5xl font-medium text-center mb-10">Register</h1>

    <div class="bg-gray-300 p-10 rounded-[2rem] shadow-sm">

        <!-- Global error message from service (eg. Username Taken) -->
        <div th:if="${registrationError}" class="mb-4 p-3 bg-red-100 text-red-700 rounded-lg text-sm text-center">
            <p th:text="${registrationError}"></p>
        </div>

        <form th:action="@{/register}" th:object="${userDto}" method="post" class="space-y-5">

            <div>
                <label class="block text-xl mb-1">Username</label>
                <input type="text" th:field="*{username}"
                       class="w-full p-2 rounded-md border-none focus:ring-2 focus:ring-green-800 outline-none">
                <p th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="text-red-600 text-xs mt-1"></p>
            </div>

            <div>
                <label class="block text-xl mb-1">Email</label>
                <input type="email" th:field="*{email}"
                       class="w-full p-2 rounded-md border-none focus:ring-2 focus:ring-green-800 outline-none">
                <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-red-600 text-xs mt-1"></p>
            </div>

            <div>
                <label class="block text-xl mb-1">Password</label>
                <input type="password" th:field="*{password}"
                       class="w-full p-2 rounded-md border-none focus:ring-2 focus:ring-green-800 outline-none">
                <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="text-red-600 text-xs mt-1"></p>
            </div>

            <div>
                <label class="block text-xl mb-1">Confirm Password</label>
                <input type="password" th:field="*{confirmPassword}"
                       class="w-full p-2 rounded-md border-none focus:ring-2 focus:ring-green-800 outline-none">
                <p th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}" class="text-red-600 text-xs mt-1"></p>
            </div>

            <div>
                <label class="block text-xl mb-3">Profile Visibility</label>
                <div class="flex items-center space-x-12 px-2">
                    <label class="flex items-center space-x-3 cursor-pointer">
                        <input type="radio" th:field="*{profileVisibility}" value="Public" checked
                               class="w-6 h-6 text-green-800 focus:ring-green-800 border-gray-300">
                        <span class="text-xl">Public</span>
                    </label>
                    <label class="flex items-center space-x-3 cursor-pointer">
                        <input type="radio" th:field="*{profileVisibility}" value="Private"
                               class="w-6 h-6 text-green-800 focus:ring-green-800 border-gray-300">
                        <span class="text-xl">Private</span>
                    </label>
                </div>
            </div>

            <div class="flex justify-center pt-4">
                <button type="submit"
                        class="bg-green-800 text-white px-10 py-2 rounded-lg text-lg hover:bg-green-900 transition shadow-md">
                    Sign up
                </button>
            </div>
        </form>

        <p class="mt-8 text-center text-lg">
            Already have an account?
            <a th:href="@{/login}" class="underline font-medium decoration-1 underline-offset-4">Login</a>
        </p>
    </div>
</div>

</body>
</html>
