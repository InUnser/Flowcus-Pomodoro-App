<!DOCTYPE html>
<html lang='en' xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Flowcus - New Session</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        input[type=range] {
            -webkit-appearance: none;
            background: transparent;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 12px;
            background: #1a1a1a;
            border-radius: 6px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 32px;
            width: 32px;
            border-radius: 50%;
            background: #f3f4f6;
            border: 4px solid #1a1a1a;
            margin-top: -10px;
            cursor: pointer;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

<div th:replace="~{fragments/header :: navbar}"></div>

<main class="container mx-auto px-4 py-12 flex justify-center items-center">

    <div class="w-full max-w-xl bg-gray-300 p-10 rounded-[2.5rem] shadow-sm">
        <h1 class="text-5xl font-medium text-center mb-8">New Pomodoro Session</h1>

        <form th:action="@{/sessions/start}" th:object="${sessionDto}" method="post" class="space-y-6">

            <!-- Session Title -->
            <div>
                <label class="block text-2xl mb-2">Session Title</label>
                <input type="text" th:field="*{title}" placeholder="e.g. Studying Math"
                       class="w-full p-3 rounded-lg border-none focus:ring-2 focus:ring-green-800 outline-none text-xl">
                <p th:if="${#fields.hasErrors('title')}" th:errors="*{title}" class="text-red-600 text-sm mt-1"></p>
            </div>

            <!-- Goal Intervals -->
            <div>
                <label class="block text-2xl mb-2">How many focus session to long break:</label>
                <input type="number" min="2" max="10" th:field="*{focusSessionsBeforeLongBreak}"
                       class="w-full p-3 rounded-lg border-none focus:ring-2 focus:ring-green-800 outline-none text-xl">
                <p th:if="${#fields.hasErrors('focusSessionsBeforeLongBreak')}" th:errors="*{focusSessionsBeforeLongBreak}" class="text-red-600 text-sm mt-1"></p>
            </div>

            <!-- Focus Duration Slider -->
            <div>
                <div class="flex justify-between items-center mb-2">
                    <label class="text-2xl">Focus Duration</label>
                    <span class="text-xl font-bold" id="focusVal">25 min</span>
                </div>
                <input type="range" th:field="*{focusDuration}" min="1" max="180" step="1"
                       class="w-full h-3 bg-gray-800 rounded-lg appearance-none cursor-pointer"
                       oninput="document.getElementById('focusVal').innerText = this.value + ' min'">
                <p th:if="${#fields.hasErrors('focusDuration')}" th:errors="*{focusDuration}" class="text-red-600 text-sm mt-1"></p>
            </div>

            <!-- Short Break Slider -->
            <div>
                <div class="flex justify-between items-center mb-2">
                    <label class="text-2xl">Short Break Duration</label>
                    <span class="text-xl font-bold" id="shortVal">5 min</span>
                </div>
                <input type="range" th:field="*{shortBreakDuration}" min="1" max="30" step="1"
                       class="w-full h-3 bg-gray-800 rounded-lg appearance-none cursor-pointer"
                       oninput="document.getElementById('shortVal').innerText = this.value + ' min'">
                <p th:if="${#fields.hasErrors('shortBreakDuration')}" th:errors="*{shortBreakDuration}" class="text-red-600 text-sm mt-1"></p>

            </div>

            <!-- Long Break Slider -->
            <div>
                <div class="flex justify-between items-center mb-2">
                    <label class="text-2xl">Long Break Duration</label>
                    <span class="text-xl font-bold" id="longVal">15 min</span>
                </div>
                <input type="range" th:field="*{longBreakDuration}" min="1" max="60" step="1"
                       class="w-full h-3 bg-gray-800 rounded-lg appearance-none cursor-pointer"
                       oninput="document.getElementById('longVal').innerText = this.value + ' min'">
                <p th:if="${#fields.hasErrors('longBreakDuration')}" th:errors="*{longBreakDuration}" class="text-red-600 text-sm mt-1"></p>
            </div>

            <!-- Action Buttons -->
            <div class="flex justify-between gap-4 pt-6">
                <a th:href="@{/home}"
                   class="bg-red-700 text-white px-8 py-3 rounded-xl text-xl font-bold hover:bg-red-800 transition shadow-md w-1/2 text-center">
                    Cancel
                </a>
                <button type="submit"
                        class="bg-green-800 text-white px-8 py-3 rounded-xl text-xl font-bold hover:bg-green-900 transition shadow-md w-1/2">
                    Start Pomodoro Session
                </button>
            </div>
        </form>
    </div>

</main>

<script>
    // Set initial values for sliders on page load
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('focusVal').innerText = document.querySelector('[name="focusDuration"]').value + ' min';
        document.getElementById('shortVal').innerText = document.querySelector('[name="shortBreakDuration"]').value + ' min';
        document.getElementById('longVal').innerText = document.querySelector('[name="longBreakDuration"]').value + ' min';
    });

    // Back-Button and State Management
    window.addEventListener('pageshow', (event) => {
        // Did the user press the Back button to see a frozen, cached version of this page?
        if (event.persisted) {
            // Force the browser to ask Spring Boot what the real truth is
            window.location.reload();
        } else {
            // This is a fresh load from the server.
            // Since Spring Boot allowed us to see this page, it means this user
            // has no active session in the database.
            // So, if localStorage thinks there is an active session, it's a ghost from
            // another user or another tab so remove it
            localStorage.removeItem('flowcus_active');
        }
    });
</script>
</body>
</html>
